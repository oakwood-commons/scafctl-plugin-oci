version: "3"

vars:
  BINARY: scafctl-plugin-oci
  CLI: '{{default "cldctl" .CLI}}'
  DIST: "{{.ROOT_DIR | toSlash}}/dist"
  COVER: "{{.ROOT_DIR | toSlash}}/cover"
  VERSION: '{{default "" .VERSION}}'
  EXE: '{{if eq OS "windows"}}.exe{{end}}'

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the plugin binary
    env:
      CGO_ENABLED: "0"
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}{{.EXE}}"
    cmds:
      - mkdir -p {{.DIST}}
      - >-
        go build -ldflags "-s -w{{if .VERSION}} -X github.com/oakwood-commons/scafctl-plugin-oci/internal/oci.version={{.VERSION}}{{end}}"
        -o {{.DIST}}/{{.BINARY}}{{.EXE}}
        ./cmd/{{.BINARY}}/

  publish:local:
    desc: Build and install the plugin into the local catalog
    deps: [build]
    cmds:
      - >-
        {{.CLI}} build plugin --force
        --name oci
        --kind provider
        --version {{default "0.1.0" .VERSION}}
        --platform {{OS}}/{{ARCH}}={{.DIST}}/{{.BINARY}}{{.EXE}}

  release:tag:
    desc: "Create and push a signed release tag (usage: task release:tag VERSION=0.1.1)"
    requires:
      vars: [VERSION]
    cmds:
      - git tag -s v{{.VERSION}} -m "v{{.VERSION}}"
      - git push origin v{{.VERSION}}

  release:local:
    desc: "Build and install a versioned local catalog artifact (usage: task release:local VERSION=0.1.1)"
    requires:
      vars: [VERSION]
    deps: [build]
    cmds:
      - >-
        {{.CLI}} build plugin --force
        --name oci
        --kind provider
        --version {{.VERSION}}
        --platform {{OS}}/{{ARCH}}={{.DIST}}/{{.BINARY}}{{.EXE}}

  test:
    desc: Run tests
    cmds:
      - go test -count=1 -shuffle=on -timeout 5m ./...

  test:race:
    desc: Run tests with race detector (requires CGO/gcc)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -race -count=1 -shuffle=on -timeout 5m ./...

  test:cover:
    desc: Run tests with coverage
    cmds:
      - mkdir -p {{.COVER}}
      - go test -coverprofile={{.COVER}}/cover.out -covermode=atomic ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run linter with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  bench:
    desc: Run benchmarks
    cmds:
      - go test -run='^$' -bench='.' -benchmem -count=1 ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ cover/ .task/

  ci:
    desc: Full CI pipeline (lint + test + build)
    cmds:
      - task: lint
      - task: test
      - task: build